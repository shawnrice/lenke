# Per-target codegen tuning. rustflags are keyed by target triple, so a plain
# `cargo build` (host target) gets `native`, while a `--target <triple>` deploy
# build gets a pinned-but-portable CPU baseline.
#
# IMPORTANT: deploy targets must NOT use `native` — that bakes in the *build*
# machine's CPU features and SIGILLs ("illegal instruction") on any node that
# lacks them. K8s schedules across heterogeneous instance types, so pin a
# baseline the whole fleet is guaranteed to have.

# Local dev (Shawn's M3). NEON is baseline on aarch64; `native` also unlocks the
# host's exact feature set (FMA, etc.) for the fastest local builds.
[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]

# AWS x86-64 nodes. x86-64-v3 ≈ Haswell+ (AVX2, BMI2, FMA) — true of every
# current-gen AWS instance (m5/c5/m6i/…). Drop to x86-64-v2 (SSE4.2, no AVX) if
# the fleet might include pre-2013 / some burstable hardware.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=x86-64-v3"]

# AWS Graviton (arm64 Linux). neoverse-n1 = Graviton2 (safe broad baseline);
# use neoverse-v1 for Graviton3, neoverse-v2 for Graviton4 if the fleet is fixed.
[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=neoverse-n1"]
