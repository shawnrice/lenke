name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on a PR branch; let pushes to main finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: check · build · test (TypeScript + Rust)
    runs-on: ubuntu-latest
    steps:
      # checkout pinned to v6 (v4 is deprecated / EOL).
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13 # matches "packageManager" in package.json

      # Rust toolchain (cargo/clippy/rustfmt) + the wasm32 target, so the wasm
      # backend can be built and its tests actually run (not silently skip).
      # Keep this ref in sync with crates/lenke-core/rust-toolchain.toml.
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/lenke-core

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build first: each package exports its types from dist/, and the root
      # typecheck has no source-path mapping, so `check`'s tsc only resolves
      # @lenke/* once dist/ exists. nx caches any unchanged build work.
      # `bun run build` builds the ffi cdylib (lenke-core:build, uncached) and
      # the napi addon (@lenke/node:build, cache-keyed on the crate src so a
      # Rust-only change rebuilds it — see the `rustCore` named input).
      - name: Build
        run: bun run build

      # The wasm artifact is NOT part of the nx build graph (a per-platform
      # cargo target), so build it explicitly here — otherwise the wasm backend
      # tests in `bun run test` skip themselves for lack of the `.wasm`.
      - name: Build wasm backend
        run: bun run build:wasm

      # typecheck + lint (oxlint + cargo clippy -D warnings) + format check
      # (oxfmt + cargo fmt --check), across both stacks.
      - name: Check
        run: bun run check

      - name: Test
        run: bun run test

      # FFI canary: prove the cdylib built above loads and round-trips over bun:ffi.
      - name: FFI smoke test
        run: bun test crates/lenke-core/ffi-smoke.test.ts

  # ===========================================================================
  # Native Node addon (@lenke/node) — build + test on Linux and macOS (arm64).
  #
  # A *native* build + `node --test` run on Apple Silicon (which the Linux `ci`
  # job above can't do), and the seam to later emit per-platform prebuilt
  # `.node` binaries (add an upload-artifact / napi publish step). Standard
  # runners (incl. macOS) are free on public repos, so this costs only CI
  # minutes / queue time.
  # ===========================================================================
  node-addon:
    name: node addon · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            # Portable x86-64 baseline for a distributable prebuilt — overrides
            # the AWS-tuned `x86-64-v3` in .cargo/config.toml, which would
            # SIGILL on pre-Haswell CPUs.
            cpu_baseline: x86-64-v2
          - os: macos-latest # Apple Silicon (arm64)
            # Pin a portable Apple-Silicon baseline instead of the config's
            # `target-cpu=native`, which bakes in the runner's exact CPU.
            cpu_baseline: apple-m1
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.96.0
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/node
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # `nx build @lenke/node` runs `napi build --platform --release --esm`
      # and (via ^build) builds the @lenke/native dep the test imports. The
      # RUSTFLAGS override replaces the config's per-target `target-cpu` so a
      # distributed prebuilt runs across the whole arch, not just the runner.
      - name: Build @lenke/node (napi ESM) with a portable CPU baseline
        env:
          RUSTFLAGS: -C target-cpu=${{ matrix.cpu_baseline }}
        run: bunx nx build @lenke/node
      - name: Test @lenke/node
        working-directory: packages/node
        run: node --test
