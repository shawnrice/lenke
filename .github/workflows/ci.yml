name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on a PR branch; let pushes to main finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: check · build · test (TypeScript + Rust)
    runs-on: ubuntu-latest
    steps:
      # checkout pinned to v6 (v4 is deprecated / EOL).
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13 # matches "packageManager" in package.json

      # Rust toolchain (cargo/clippy/rustfmt). Keep this ref in sync with
      # crates/pl-graph-core/rust-toolchain.toml.
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/pl-graph-core

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build first: each package exports its types from dist/, and the root
      # typecheck has no source-path mapping, so `check`'s tsc only resolves
      # @pl-graph/* once dist/ exists. nx caches any unchanged build work.
      - name: Build
        run: bun run build

      # typecheck + lint (oxlint + cargo clippy -D warnings) + format check
      # (oxfmt + cargo fmt --check), across both stacks.
      - name: Check
        run: bun run check

      - name: Test
        run: bun run test

      # FFI canary: prove the cdylib built above loads and round-trips over bun:ffi.
      - name: FFI smoke test
        run: bun test crates/pl-graph-core/ffi-smoke.test.ts
