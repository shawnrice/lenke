name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on a PR branch; let pushes to main finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: check · build · test (TypeScript + Rust)
    runs-on: ubuntu-latest
    steps:
      # checkout pinned to v6 (v4 is deprecated / EOL).
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13 # matches "packageManager" in package.json

      # Rust toolchain (cargo/clippy/rustfmt). Keep this ref in sync with
      # crates/lenke-core/rust-toolchain.toml.
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/lenke-core

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build first: each package exports its types from dist/, and the root
      # typecheck has no source-path mapping, so `check`'s tsc only resolves
      # @lenke/* once dist/ exists. nx caches any unchanged build work.
      - name: Build
        run: bun run build

      # typecheck + lint (oxlint + cargo clippy -D warnings) + format check
      # (oxfmt + cargo fmt --check), across both stacks.
      - name: Check
        run: bun run check

      - name: Test
        run: bun run test

      # FFI canary: prove the cdylib built above loads and round-trips over bun:ffi.
      - name: FFI smoke test
        run: bun test crates/lenke-core/ffi-smoke.test.ts

  # ===========================================================================
  # Native Node addon (@lenke/node) — build + test on Linux and macOS (arm64).
  #
  # DISABLED ON PURPOSE. We're not ready to run this much CI yet, so it's left
  # commented out. Standard runners (incl. macOS) are FREE on public repos, so
  # enabling it costs no money — only CI minutes / queue time. To turn it on,
  # strip the leading "# " from each line below.
  #
  # This gives a *native* build + `node --test` run on Apple Silicon (which the
  # Linux `ci` job above can't do), and is the seam to later emit per-platform
  # prebuilt `.node` binaries (add an upload-artifact / napi publish step).
  # ===========================================================================
  #
  #   node-addon:
  #     name: node addon · ${{ matrix.os }}
  #     strategy:
  #       fail-fast: false
  #       matrix:
  #         include:
  #           - os: ubuntu-latest
  #             # Portable x86-64 baseline for a distributable prebuilt — overrides
  #             # the AWS-tuned `x86-64-v3` in .cargo/config.toml, which would
  #             # SIGILL on pre-Haswell CPUs.
  #             cpu_baseline: x86-64-v2
  #           - os: macos-latest # Apple Silicon (arm64)
  #             # Pin a portable Apple-Silicon baseline instead of the config's
  #             # `target-cpu=native`, which bakes in the runner's exact CPU.
  #             cpu_baseline: apple-m1
